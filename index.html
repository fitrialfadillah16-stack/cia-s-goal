<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cia's Goal</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#ffe4ec;
    margin:0;
    padding:20px;
}

.card{
    background:white;
    border-radius:20px;
    padding:20px;
    margin-bottom:15px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

h1{
    color:#ff4f87;
}

.quest{
    margin:10px 0;
}

button{
    background:#ff7aa8;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:10px;
}
</style>
</head>

<body>

<h1>💗 Cia's Goal</h1>

<div class="card">
    <h2>Level <span id="level">1</span></h2>
    <p>⚖️ Berat sekarang: 37 kg</p>
    <p>🎯 Target: 45 kg</p>
    <p>✨ XP: <span id="xp">0</span> / 100</p>
    <button onclick="undoXP()">
↩️ Undo
</button>

<button onclick="resetProgress()">
🔄 Reset
</button>
    <div style="font-size:80px;text-align:center;" id="cat">
🐱
</div>
<div class="card">

<h2>⚖️ Weight Tracker</h2>

<input
id="weightInput"
type="number"
step="0.1"
placeholder="Masukkan berat badan">

<button onclick="saveWeight()">
Simpan
</button>

<p>
Berat saat ini:
<span id="currentWeight">
37
</span> kg
</p>

<p>
Target:
45 kg
</p>

<p>
Progress:
<span id="progressPercent">
82
</span>%
</p>

</div>
<div style="background:#ffd6e5;border-radius:20px;height:20px;">
    <div id="xpBar"
         style="background:#ff6fa5;
         height:20px;
         width:0%;
         border-radius:20px;">
    </div>
</div>
</div>

<div class="card">
<h2 id="dayTitle">📅 Day 1 of 30</h2>

<button onclick="prevDay()">
⬅️ Hari Sebelumnya
</button>

<button onclick="nextDay()">
➡️ Hari Berikutnya
</button>
<br><br>
    <h2>📋 Daily Quest</h2>

 <div class="quest" id="questContainer">

</div>
</div>

<div class="card">
    <h2>🏆 Achievement</h2>

    <p>🔒 Breakfast Warrior</p>
    <p>🔒 First 1 Kg</p>
    <p>🔒 Smoke Reducer</p>
</div>
<script>

let xp = localStorage.getItem("xp") || 0;
    let currentDay =
parseInt(
localStorage.getItem("currentDay")
) || 1;
    let lastAction = 0;let level = Math.floor(xp / 100) + 1;let weight =
localStorage.getItem("weight") || 37;

document.getElementById("xp").innerText = xp;document.getElementById("level").innerText = level;
    document.getElementById("dayTitle").innerText =
"📅 Day " + currentDay + " of 30";
    updateCat();
    updateWeight();
document.getElementById("xpBar").style.width =
Math.min((xp / 100) * 100, 100) + "%";
const checkboxes = document.querySelectorAll('input[type="checkbox"]');
checkboxes.forEach((box, index) => {

    if(localStorage.getItem("check" + index) === "true"){
        box.checked = true;
    }

});
checkboxes.forEach(box => {

    box.addEventListener("change", () => {
        const index = Array.from(checkboxes).indexOf(box);

localStorage.setItem(
    "check" + index,
    box.checked
);
        if(box.checked){
    xp = parseInt(xp) + 10;
    lastAction = 10;
} else {
    xp = parseInt(xp) - 10;
    lastAction = -10;
}

        localStorage.setItem("xp", xp);

        document.getElementById("xp").innerText = xp;level = Math.floor(xp / 100) + 1;

document.getElementById("level").innerText = level;
        updateCat();
document.getElementById("xpBar").style.width =
Math.min((xp / 100) * 100, 100) + "%";
    });

});
function updateCat(){

    let cat = "🐱";

    if(level >= 5){
        cat = "🐈";
    }

    if(level >= 10){
        cat = "😺";
    }

    if(level >= 15){
        cat = "😸";
    }

    document.getElementById("cat").innerText = cat;

}
    function saveWeight(){

    weight =
    document.getElementById(
    "weightInput"
    ).value;

    if(!weight) return;

    localStorage.setItem(
    "weight",
    weight
    );

    updateWeight();

}

function updateWeight(){

    document.getElementById(
    "currentWeight"
    ).innerText = weight;

    let percent =
    Math.round(
    (weight / 45) * 100
    );

    document.getElementById(
    "progressPercent"
    ).innerText = percent;

}
    function undoXP(){

    xp = parseInt(xp) - lastAction;

    if(xp < 0){
        xp = 0;
    }

    localStorage.setItem("xp", xp);

    level = Math.floor(xp / 100) + 1;

    document.getElementById("xp").innerText = xp;

    document.getElementById("level").innerText = level;

    document.getElementById("xpBar").style.width =
    Math.min((xp / 100) * 100, 100) + "%";

    updateCat();

}

function resetProgress(){

    if(!confirm(
        "Yakin mau reset semua progress?"
    )){
        return;
    }

    localStorage.clear();

    location.reload();

}
    const days = {

1: `
<h3>📅 Hari 1</h3>

<p><b>🍳 08.00 Sarapan</b></p>

<input type="checkbox"> Nasi Putih<br>
<input type="checkbox"> Telur Dadar 2 Butir<br>
<input type="checkbox"> Susu Full Cream<br><br>

<p><b>💪 18.30 Workout</b></p>

<input type="checkbox"> Squat x10<br>
<input type="checkbox"> Wall Push Up x10<br>
<input type="checkbox"> Plank 15 Detik<br><br>

<p><b>🚬 Target</b></p>

<input type="checkbox"> Maks 15 Batang
`,

2: `
<h3>📅 Hari 2</h3>

<p><b>🍳 08.00 Sarapan</b></p>

<input type="checkbox"> Nasi Uduk<br>
<input type="checkbox"> Telur Rebus 2<br>
<input type="checkbox"> Susu Full Cream<br><br>

<p><b>💪 18.30 Workout</b></p>

<input type="checkbox"> Squat x10<br>
<input type="checkbox"> Wall Push Up x10<br>
<input type="checkbox"> Plank 15 Detik<br><br>

<p><b>🚬 Target</b></p>

<input type="checkbox"> Maks 15 Batang
`,

3: `
<h3>📅 Hari 3</h3>

<p><b>🍳 08.00 Sarapan</b></p>

<input type="checkbox"> Bubur Ayam<br>
<input type="checkbox"> Telur Rebus<br>
<input type="checkbox"> Susu Full Cream<br><br>

<p><b>💪 18.30 Workout</b></p>

<input type="checkbox"> Squat x10<br>
<input type="checkbox"> Wall Push Up x10<br>
<input type="checkbox"> Plank 15 Detik<br><br>

<p><b>🚬 Target</b></p>

<input type="checkbox"> Maks 14 Batang
`
};
    function nextDay(){

    if(currentDay < 30){

        currentDay++;

        localStorage.setItem(
            "currentDay",
            currentDay
        );

        document.getElementById(
            "dayTitle"
        ).innerText =
        "📅 Day " +
        currentDay +
        " of 30";
        document.getElementById(
"questContainer"
).innerHTML =
days[currentDay];

    }

}

function prevDay(){

    if(currentDay > 1){

        currentDay--;

        localStorage.setItem(
            "currentDay",
            currentDay
        );

        document.getElementById(
            "dayTitle"
        ).innerText =
        "📅 Day " +
        currentDay +
        " of 30";
        document.getElementById(
"questContainer"
).innerHTML =
days[currentDay];

    }

}
</script>
</body>
</html>
