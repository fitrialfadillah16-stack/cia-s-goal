    function saveWeight(){

    weight =

    localStorage.setItem(
    "weight",
    weight
    );

}

function updateWeight(){

    document.getElementById(
    "currentWeight"
    ).innerText = weight;

   let startWeight = 37;
let targetWeight = 45;

let percent =
Math.round(
((weight - startWeight) /
(targetWeight - startWeight))
* 100
);

if(percent < 0){
    percent = 0;
}

if(percent > 100){
    percent = 100;
}

    document.getElementById(
    "progressPercent"
    ).innerText = percent;

}
    function undoXP(){

    xp = parseInt(xp) - lastAction;

    if(xp < 0){
        xp = 0;
    }

    localStorage.setItem("xp", xp);

    level = Math.floor(xp / 100) + 1;

    document.getElementById("xp").innerText = xp;

    document.getElementById("level").innerText = level;

    document.getElementById("xpBar").style.width =
    Math.min((xp / 100) * 100, 100) + "%";

    updateCat();

}

function resetProgress(){

    function loadDay(){

    document.getElementById(
        "questContainer"
    ).innerHTML =
    days[currentDay];

    const checkboxes =
    document.querySelectorAll(
        '#questContainer input[type="checkbox"]'
    );

    checkboxes.forEach((box, index) => {

        if(
        localStorage.getItem(
        "day" + currentDay + "_check" + index
        ) === "true"
        ){
            box.checked = true;
        }

        box.addEventListener(
        "change",
        () => {

            localStorage.setItem(
            "day" + currentDay +
            "_check" + index,
            box.checked
            );

            if(box.checked){
                xp = parseInt(xp) + 10;
            }else{
                xp = parseInt(xp) - 10;
            }

            if(xp < 0){
                xp = 0;
            }

            localStorage.setItem(
            "xp",
            xp
            );

            level =
            Math.floor(xp / 100) + 1;

            document.getElementById(
            "xp"
            ).innerText = xp;

            document.getElementById(
            "level"
            ).innerText = level;

            document.getElementById(
            "xpBar"
            ).style.width =
            Math.min(
            (xp / 100) * 100,
            100
            ) + "%";

            updateCat();

        });

    });

}
    function nextDay(){

    if(currentDay < 30){

        currentDay++;

        localStorage.setItem(
            "currentDay",
            currentDay
        );

        document.getElementById(
            "dayTitle"
        ).innerText =
        "📅 Day " +
        currentDay +
        " of 30";
       loadDay();

    }

}

function prevDay(){

    if(currentDay > 1){

        currentDay--;

        localStorage.setItem(
            "currentDay",
            currentDay
        );

        document.getElementById(
            "dayTitle"
        ).innerText =
        "📅 Day " +
        currentDay +
        " of 30";
        loadDay();

    }

}
