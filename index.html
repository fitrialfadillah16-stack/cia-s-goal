<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cia's Goal</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#ffe4ec;
    margin:0;
    padding:20px;
}

.card{
    background:white;
    border-radius:20px;
    padding:20px;
    margin-bottom:15px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

h1{
    color:#ff4f87;
}

.quest{
    margin:10px 0;
}

button{
    background:#ff7aa8;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:10px;
}
</style>
</head>

<body>

<h1>💗 Cia's Goal</h1>

<div class="card">
    <h2>Level <span id="level">1</span></h2>
    <p>⚖️ Berat sekarang: 37 kg</p>
    <p>🎯 Target: 45 kg</p>
    <p>✨ XP: <span id="xp">0</span> / 100</p>

<div style="background:#ffd6e5;border-radius:20px;height:20px;">
    <div id="xpBar"
         style="background:#ff6fa5;
         height:20px;
         width:0%;
         border-radius:20px;">
    </div>
</div>
</div>

<div class="card">
    <h2>📋 Daily Quest</h2>

    <div class="quest">
        <input type="checkbox"> Sarapan
    </div>

    <div class="quest">
        <input type="checkbox"> Snack Pagi
    </div>

    <div class="quest">
        <input type="checkbox"> Makan Siang
    </div>

    <div class="quest">
        <input type="checkbox"> Snack Sore
    </div>

    <div class="quest">
        <input type="checkbox"> Makan Malam
    </div>

    <div class="quest">
        <input type="checkbox"> Susu Malam
    </div>

    <div class="quest">
        <input type="checkbox"> Latihan
    </div>

    <div class="quest">
        <input type="checkbox"> Tidur Sebelum 00.00
    </div>
</div>

<div class="card">
    <h2>🏆 Achievement</h2>

    <p>🔒 Breakfast Warrior</p>
    <p>🔒 First 1 Kg</p>
    <p>🔒 Smoke Reducer</p>
</div>
<script>

let xp = localStorage.getItem("xp") || 0;let level = Math.floor(xp / 100) + 1;

document.getElementById("xp").innerText = xp;document.getElementById("level").innerText = level;
document.getElementById("xpBar").style.width =
Math.min((xp / 100) * 100, 100) + "%";
const checkboxes = document.querySelectorAll('input[type="checkbox"]');

checkboxes.forEach(box => {

    box.addEventListener("change", () => {

        if(box.checked){
            xp = parseInt(xp) + 10;
        } else {
            xp = parseInt(xp) - 10;
        }

        localStorage.setItem("xp", xp);

        document.getElementById("xp").innerText = xp;level = Math.floor(xp / 100) + 1;

document.getElementById("level").innerText = level;
document.getElementById("xpBar").style.width =
Math.min((xp / 100) * 100, 100) + "%";
    });

});

</script>
</body>
</html>
