<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cia's Goal</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#ffe4ec;
    margin:0;
    padding:20px;
}

.card{
    background:white;
    border-radius:20px;
    padding:20px;
    margin-bottom:15px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

h1{
    color:#ff4f87;
}

.quest{
    margin:10px 0;
}

button{
    background:#ff7aa8;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:10px;
}
</style>
</head>

<body>

<h1>💗 Cia's Goal</h1>

<div class="card">
    <h2>Level 1</h2>
    <p>⚖️ Berat sekarang: 37 kg</p>
    <p>🎯 Target: 45 kg</p>
    <p>✨ XP: 0 / 100</p>
</div>

<div class="card">
    <h2>📋 Daily Quest</h2>

    <div class="quest">
        <input type="checkbox"> Sarapan
    </div>

    <div class="quest">
        <input type="checkbox"> Snack Pagi
    </div>

    <div class="quest">
        <input type="checkbox"> Makan Siang
    </div>

    <div class="quest">
        <input type="checkbox"> Snack Sore
    </div>

    <div class="quest">
        <input type="checkbox"> Makan Malam
    </div>

    <div class="quest">
        <input type="checkbox"> Susu Malam
    </div>

    <div class="quest">
        <input type="checkbox"> Latihan
    </div>

    <div class="quest">
        <input type="checkbox"> Tidur Sebelum 00.00
    </div>
</div>

<div class="card">
    <h2>🏆 Achievement</h2>

    <p>🔒 Breakfast Warrior</p>
    <p>🔒 First 1 Kg</p>
    <p>🔒 Smoke Reducer</p>
</div>

</body>
</html>
